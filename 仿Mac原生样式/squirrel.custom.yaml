patch:
  style:
    color_scheme: macos_light       # 亮色模式使用这个皮肤
    color_scheme_dark: macos_dark   # 暗色模式自动切换

  preset_color_schemes:
    macos_light:
      font_face: "PingFangSC"           # macOS 默认字体
      font_point: 16
      label_font_face: "PingFangSC"
      label_font_point: 12
      comment_font_face: "PingFangSC"
      comment_font_point: 16
      candidate_format: "%c\u2005%@\u2005"
      candidate_list_layout: linear
      text_orientation: horizontal
      inline_preedit: true
      translucency: false
      mutual_exclusive: false
      border_height: 1
      border_width: 1
      corner_radius: 5
      hilited_corner_radius: 5
      line_spacing: 5
      spacing: 10
      color_space: srgb
      back_color: 0xFFFFFF
      candidate_back_color: 0xFFFFFF
      hilited_candidate_back_color: 0xD75A00
      label_color: 0x999999
      hilited_candidate_label_color: 0xFFFFFF
      candidate_text_color: 0x3c3c3c
      hilited_candidate_text_color: 0xFFFFFF
      comment_text_color: 0x999999
      hilited_comment_text_color: 0xFFFFFF
      text_color: 0x424242
      hilited_text_color: 0xFFFFFF
      border_color: 0xFFFFFF

    macos_dark:
      font_face: "PingFangSC"
      font_point: 16
      label_font_face: "PingFangSC"
      label_font_point: 12
      comment_font_face: "PingFangSC"
      comment_font_point: 16
      candidate_format: "%c\u2005%@\u2005"
      candidate_list_layout: linear
      text_orientation: horizontal
      inline_preedit: true
      translucency: false
      mutual_exclusive: false
      border_height: 1
      border_width: 1
      corner_radius: 5
      hilited_corner_radius: 5
      line_spacing: 5
      spacing: 10
      color_space: srgb
      back_color: 0x1f1e2d
      candidate_back_color: 0x1f1e2d
      hilited_candidate_back_color: 0xD75A00
      label_color: 0x999999
      hilited_candidate_label_color: 0xFFFFFF
      candidate_text_color: 0xe9e9ea
      hilited_candidate_text_color: 0xFFFFFF
      comment_text_color: 0x999999
      hilited_comment_text_color: 0x999999
      text_color: 0x808080
      hilited_text_color: 0xFFFFFF
      border_color: 0x050505